<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">

<style>
:root{
  /* Base – noite de estádio */
  --bg:#050d18;
  --surf:#0c1b30;
  --surf2:#122540;
  --bdr:#1c3a5e;
  --txt:#eaf3fc;
  --muted:#6e95b8;

  /* Copa do Mundo */
  --green:#15803d;
  --green-mid:#16a34a;
  --green-light:#22c55e;
  --green-bright:#4ade80;
  --gold:#d97706;
  --gold-light:#f59e0b;
  --gold-bright:#fbbf24;

  /* Funcionais */
  --neg:#ef4444;
  --warn:#f59e0b;
  --purple:#a855f7;
}

*{box-sizing:border-box;margin:0;padding:0}

/* Faixas de gramado no fundo */
body{
  font-family:'Inter',sans-serif;
  background-color:var(--bg);
  background-image:repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 60px,
    rgba(21,128,61,.04) 60px, rgba(21,128,61,.04) 120px
  );
  color:var(--txt);
  min-height:100vh;
}

/* Faixa superior – verde · ouro · branco · ouro · verde */
body::before{
  content:'';display:block;height:5px;
  background:linear-gradient(90deg,
    #15803d 0%, #15803d 20%,
    #fbbf24 35%, #ffffff 50%,
    #fbbf24 65%, #15803d 80%,
    #15803d 100%
  );
}

/* Header */
header{
  padding:18px 24px;
  background:linear-gradient(180deg,#0d1e35 0%,#091525 100%);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
  position:relative;overflow:hidden;
}
/* Linha dourada na borda inferior do header */
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-light),var(--green-light),var(--gold-light),transparent);
}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:-.3px;color:#fff}
header p{color:var(--muted);font-size:.78rem;margin-top:3px}

/* Badge Copa */
.copa-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(21,128,61,.2),rgba(217,119,6,.2));
  border:1px solid rgba(251,191,36,.35);
  border-radius:20px;padding:5px 13px;
  font-size:.7rem;font-weight:700;color:var(--gold-bright);
  letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;
}

/* === Tab Bar === */
.tab-bar{
  display:flex;
  background:#0a1628;
  border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:50;
}
.tab{
  flex:1;padding:13px 8px;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);font-family:inherit;
  font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.tab.active{
  color:#fff;
  border-bottom-color:var(--green-mid);
  background:rgba(21,128,61,.08);
}
.tab:hover:not(.active){color:var(--txt);background:rgba(255,255,255,.04)}

/* Contêiner do formulário */
.wrap{
  padding:20px;max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;gap:16px;
}

.fg{display:flex;flex-direction:column;gap:6px}

/* Labels em dourado */
label.lbl{
  font-size:.68rem;font-weight:700;
  color:var(--gold-light);
  text-transform:uppercase;letter-spacing:.8px;
}

/* Inputs */
select,textarea,input[type=date],input[type=text]{
  background:var(--surf2);color:var(--txt);
  border:1px solid var(--bdr);
  border-radius:8px;padding:12px;
  font-size:.9rem;font-family:inherit;width:100%;
  -webkit-appearance:none;appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
select:focus,textarea:focus,input:focus{
  outline:none;
  border-color:var(--green-mid);
  box-shadow:0 0 0 3px rgba(22,163,74,.18);
}
select:disabled{opacity:.4;cursor:not-allowed}
textarea{resize:vertical;min-height:100px}

/* Divisor com bola ao centro */
.divider{
  position:relative;height:1px;margin:4px 0;
  background:linear-gradient(90deg,transparent,var(--bdr) 25%,var(--bdr) 75%,transparent);
}
.divider::before{
  content:'⚽';
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:var(--bg);
  padding:0 10px;font-size:.85rem;line-height:1;
}

/* Grades de opções */
.rg{display:grid;gap:8px}
.rg2{grid-template-columns:1fr 1fr}
.rg3{grid-template-columns:1fr 1fr 1fr}

.ropt{
  display:flex;align-items:center;justify-content:center;
  padding:11px 8px;border-radius:8px;
  border:1.5px solid var(--bdr);
  background:var(--surf);
  cursor:pointer;font-size:.83rem;font-weight:500;
  transition:all .15s;text-align:center;user-select:none;
  color:var(--muted);
}
.ropt:hover{
  border-color:var(--green-mid);
  background:var(--surf2);
  color:var(--txt);
}

/* Estados selecionados */
.sel-pos    {border-color:#22c55e;background:#22c55e18;color:#22c55e}
.sel-neg    {border-color:#ef4444;background:#ef444418;color:#ef4444}
.sel-tipo   {border-color:var(--gold-light);background:rgba(245,158,11,.12);color:var(--gold-bright)}
.sel-leve   {border-color:#22c55e;background:#22c55e18;color:#22c55e}
.sel-media  {border-color:#f59e0b;background:#f59e0b18;color:#f59e0b}
.sel-grave  {border-color:#ef4444;background:#ef444418;color:#ef4444}
.sel-acao   {border-color:#a855f7;background:#a855f718;color:#a855f7}
.sel-nenhuma{border-color:var(--bdr);background:var(--surf2);color:var(--muted)}

/* Botão – verde gramado com troféu */
.btn{
  background:linear-gradient(135deg,#15803d 0%,#16a34a 55%,#1db954 100%);
  color:#fff;border:none;border-radius:8px;
  padding:14px;font-size:1rem;font-weight:700;
  cursor:pointer;width:100%;
  transition:all .2s;margin-top:4px;
  letter-spacing:.2px;
  box-shadow:0 4px 18px rgba(21,128,61,.35);
}
.btn::after{content:' 🏆'}
.btn:hover{
  background:linear-gradient(135deg,#166534 0%,#15803d 55%,#16a34a 100%);
  box-shadow:0 6px 26px rgba(21,128,61,.5);
  transform:translateY(-1px);
}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:10px;
  font-size:.88rem;font-weight:600;
  box-shadow:0 4px 20px #0008;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;
}
.toast.show{opacity:1}
.toast.ok {background:#15803d;color:#fff}
.toast.err{background:#dc2626;color:#fff}

/* === Histórico === */
.hist-identity{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:10px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.hist-identity-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.hist-identity-name{font-size:.84rem;font-weight:600;color:var(--txt);line-height:1.3}
.hist-trocar{
  background:none;border:1px solid var(--bdr);border-radius:6px;
  padding:6px 12px;font-size:.72rem;color:var(--muted);
  cursor:pointer;font-family:inherit;font-weight:600;
  transition:all .15s;white-space:nowrap;
}
.hist-trocar:hover{border-color:var(--gold-light);color:var(--gold-light)}

.hist-selector{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:10px;padding:16px;
  display:flex;flex-direction:column;gap:12px;
}
.hist-selector-label{font-size:.75rem;color:var(--muted)}
.btn-hist{
  background:linear-gradient(135deg,#15803d,#16a34a);
  color:#fff;border:none;border-radius:8px;
  padding:11px;font-size:.88rem;font-weight:700;
  cursor:pointer;font-family:inherit;
  transition:opacity .2s;
}
.btn-hist:hover{opacity:.85}

.hist-counter{
  font-size:.73rem;color:var(--muted);text-align:right;padding:0 2px;
}

.hist-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:14px;
  display:flex;flex-direction:column;gap:10px;
}
.hist-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hist-card-tecnico{font-size:.88rem;font-weight:600;color:var(--txt)}
.hist-card-data{font-size:.73rem;color:var(--muted);white-space:nowrap;padding-top:2px}

.hist-badges{display:flex;flex-wrap:wrap;gap:6px}
.hbadge{
  display:inline-block;padding:3px 9px;border-radius:20px;
  font-size:.67rem;font-weight:700;letter-spacing:.3px;
}
.hb-tipo   {background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.hb-pos    {background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.hb-neg    {background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.hb-leve   {background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.hb-media  {background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.hb-grave  {background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.hb-acao   {background:rgba(168,85,247,.12);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
.hb-nenhuma{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--bdr)}

.hist-desc{font-size:.8rem;color:var(--muted);line-height:1.55}
.hist-desc.collapsed{
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hist-desc-toggle{
  font-size:.7rem;color:var(--green-mid);cursor:pointer;
  display:inline-block;margin-top:4px;
}
.hist-desc-toggle:hover{color:var(--green-bright)}

.hist-empty{
  text-align:center;padding:40px 20px;
  color:var(--muted);font-size:.85rem;line-height:1.6;
}
.hist-empty-icon{font-size:2rem;display:block;margin-bottom:10px}

.hist-loading{
  text-align:center;padding:40px 20px;
  color:var(--muted);font-size:.85rem;
}

/* Assinatura */
.sig-wrap{
  border:1.5px dashed var(--bdr);border-radius:8px;
  overflow:hidden;background:var(--surf2);
  touch-action:none;position:relative;cursor:crosshair;
  user-select:none;-webkit-user-select:none;
}
.sig-wrap canvas{display:block;width:100%}
.sig-ph{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;pointer-events:none;
  color:var(--muted);font-size:.78rem;text-align:center;
}
.sig-actions{display:flex;justify-content:flex-end;margin-top:6px}
.sig-clear{
  background:none;border:1px solid var(--bdr);border-radius:6px;
  padding:5px 12px;font-size:.72rem;color:var(--muted);
  cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;
}
.sig-clear:hover{border-color:var(--neg);color:var(--neg)}

/* === Modal NC detalhe === */
.nc-overlay{
  position:fixed;inset:0;background:#0009;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.nc-overlay.open{opacity:1;pointer-events:all}
.nc-sheet{
  position:fixed;left:0;right:0;bottom:0;
  background:var(--surf2);border-radius:16px 16px 0 0;
  border-top:1px solid var(--bdr);
  z-index:201;max-height:80vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.nc-sheet.open{transform:translateY(0)}
.nc-sheet-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--bdr);margin:10px auto 0;flex-shrink:0;
}
.nc-sheet-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;flex-shrink:0;
  border-bottom:1px solid var(--bdr);
}
.nc-sheet-header h3{font-size:.9rem;font-weight:700;color:var(--txt)}
.nc-sheet-close{
  background:none;border:none;color:var(--muted);
  font-size:1.5rem;cursor:pointer;line-height:1;padding:4px;
}
.nc-sheet-body{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.nc-detail-row{display:flex;flex-direction:column;gap:3px}
.nc-detail-lbl{font-size:.63rem;font-weight:700;color:var(--gold-light);text-transform:uppercase;letter-spacing:.7px}
.nc-detail-val{font-size:.85rem;color:var(--txt);line-height:1.5}
.nc-detail-val.muted{color:var(--muted)}
.nc-detail-divider{height:1px;background:var(--bdr)}
.hist-card.clickable{cursor:pointer;transition:border-color .15s}
.hist-card.clickable:active{border-color:var(--gold-light)}

/* === Não Conformidades === */
.nc-toolbar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.nc-toolbar select{
  width:auto;min-width:160px;font-size:.78rem;padding:6px 10px;
}
</style>
</head>

    "WENDEL PEREIRA LIMA","WESLLEY LOPES TRIGUEIRO"
  ]
};

document.getElementById('data').valueAsDate = new Date();

document.getElementById('supervisor').addEventListener('change', function() {
  const tecEl = document.getElementById('tecnico');
  const equipe = EQUIPES[this.value] || [];
  const isOutra = this.value === 'OUTRA EQUIPE';
  document.getElementById('nome-sup-wrap').style.display = isOutra ? '' : 'none';
  if (!isOutra) document.getElementById('nome-supervisor').value = '';
  tecEl.innerHTML = equipe.length
    ? '<option value="">Selecione...</option>' + equipe.map(t => `<option>${t}</option>`).join('')
    : '<option value="">Selecione o supervisor primeiro...</option>';
  tecEl.disabled = !equipe.length;

  if (this.value && !isOutra) {
    localStorage.setItem('fb_supervisor', this.value);
  }
});

document.getElementById('nome-supervisor').addEventListener('change', function() {
  if (this.value) localStorage.setItem('fb_supervisor', this.value);
});

const SEL = { tipo:'', natureza:'', gravidade:'', acao:'' };
const CLS_MAP = {
  tipo: () => 'sel-tipo',
  natureza: v => v === 'Positivo' ? 'sel-pos' : 'sel-neg',
  gravidade: v => v === 'Leve' ? 'sel-leve' : v === 'Média' ? 'sel-media' : 'sel-grave',
  acao: v => v === 'Nenhuma' ? 'sel-nenhuma' : 'sel-acao'
};

document.querySelectorAll('.ropt').forEach(el => {
  el.addEventListener('click', function() {
    const g = this.dataset.g, v = this.dataset.v;
    SEL[g] = v;
    document.querySelectorAll(`.ropt[data-g="${g}"]`).forEach(r => {
      r.className = 'ropt';
    });
    this.classList.add(typeof CLS_MAP[g] === 'function' ? CLS_MAP[g](v) : CLS_MAP[g]);
    if (g === 'natureza') {
      document.getElementById('grav-wrap').style.display = v === 'Positivo' ? 'none' : '';
      if (v === 'Positivo') SEL.gravidade = 'N/A';
      else if (SEL.gravidade === 'N/A') SEL.gravidade = '';
    }
  });
});

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', type === 'err' ? 7000 : 3000);
}

document.getElementById('btn-enviar').addEventListener('click', async () => {
  const supSel    = document.getElementById('supervisor').value;
  const nomeDigitado = document.getElementById('nome-supervisor').value;
  const supervisor = supSel === 'OUTRA EQUIPE' ? (nomeDigitado || 'OUTRA EQUIPE') : supSel;
  const tecnico   = document.getElementById('tecnico').value;
  const data      = document.getElementById('data').value;
  const descricao = document.getElementById('descricao').value.trim();

  if (!supSel || !tecnico || !data || !SEL.tipo || !SEL.natureza || !SEL.acao) {
    toast('Preencha todos os campos obrigatórios.', 'err'); return;
  }
  if (supSel === 'OUTRA EQUIPE' && !nomeDigitado) {
    toast('Digite seu nome.', 'err'); return;
  }
  if (SEL.natureza === 'Negativo' && !SEL.gravidade) {
    toast('Selecione a gravidade.', 'err'); return;
  }
  if (sigEmpty) {
    toast('Registre a assinatura do técnico.', 'err'); return;
  }

  const btn = document.getElementById('btn-enviar');
  btn.disabled = true; btn.textContent = 'Enviando...';

  const { error } = await db.from('feedbacks').insert({
    supervisor, tecnico, data,
    tipo: SEL.tipo,
    natureza: SEL.natureza,
    gravidade: SEL.natureza === 'Positivo' ? 'N/A' : SEL.gravidade,
    acao_requerida: SEL.acao,
    descricao,
    Assinatura: sigCanvas.toDataURL('image/png')
  });

  if (error) {
    console.error('Supabase insert error:', JSON.stringify(error));
    const msg = error.message || error.details || JSON.stringify(error);
    toast('Erro: ' + msg, 'err');
    btn.disabled = false; btn.textContent = 'Registrar Feedback';
  } else {
    toast('Feedback registrado com sucesso!', 'ok');
    setTimeout(() => location.reload(), 1500);
  }
});

/* ===== ASSINATURA ===== */
const sigCanvas = document.getElementById('sig-canvas');
const sigCtx = sigCanvas.getContext('2d');
let sigDrawing = false;
let sigEmpty = true;

function initSig() {
  const w = sigCanvas.parentElement.clientWidth;
  if (w > 0) sigCanvas.width = w;
  sigCtx.strokeStyle = '#4ade80';
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
}

function getSigPos(e) {
  const r = sigCanvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - r.left) * (sigCanvas.width / r.width),
    y: (src.clientY - r.top) * (sigCanvas.height / r.height)
  };
}

sigCanvas.addEventListener('mousedown', e => {
  sigDrawing = true; sigCtx.beginPath();
  const p = getSigPos(e); sigCtx.moveTo(p.x, p.y);
});
sigCanvas.addEventListener('mousemove', e => {
  if (!sigDrawing) return;
  const p = getSigPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); hideSigPh();
});
sigCanvas.addEventListener('mouseup', () => sigDrawing = false);
sigCanvas.addEventListener('mouseleave', () => sigDrawing = false);
sigCanvas.addEventListener('touchstart', e => {
  e.preventDefault(); sigDrawing = true; sigCtx.beginPath();
  const p = getSigPos(e); sigCtx.moveTo(p.x, p.y);
}, { passive: false });
sigCanvas.addEventListener('touchmove', e => {
  e.preventDefault(); if (!sigDrawing) return;
  const p = getSigPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); hideSigPh();
}, { passive: false });
sigCanvas.addEventListener('touchend', () => sigDrawing = false);

function hideSigPh() {
  if (!sigEmpty) return;
  sigEmpty = false;
  document.getElementById('sig-ph').style.display = 'none';
}

function clearSig() {
  sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
  sigEmpty = true;
  document.getElementById('sig-ph').style.display = '';
}

initSig();

/* ========== HISTÓRICO ========== */

function showTab(tab) {
  document.getElementById('section-form').style.display      = tab === 'form'      ? '' : 'none';
  document.getElementById('section-historico').style.display = tab === 'historico' ? '' : 'none';
  document.getElementById('section-naoconf').style.display   = tab === 'naoconf'   ? '' : 'none';
  document.getElementById('tab-form').classList.toggle('active',      tab === 'form');
  document.getElementById('tab-historico').classList.toggle('active', tab === 'historico');
  document.getElementById('tab-naoconf').classList.toggle('active',   tab === 'naoconf');
  if (tab === 'historico') loadHistorico();
  if (tab === 'naoconf')   loadNaoConformidades();
}

async function loadHistorico() {
  const sup = localStorage.getItem('fb_supervisor');
  const identityBlock = document.getElementById('hist-identity-block');
  const lista  = document.getElementById('hist-lista');
  const counter = document.getElementById('hist-counter');

  if (!sup) {
    identityBlock.innerHTML = `
      <div class="hist-selector">
        <p class="hist-selector-label">Selecione sua equipe para ver seu histórico:</p>
        <select id="hist-sup-select">
          <option value="">Selecione...</option>
          <option>ARTHUR GOMES CRUZ</option>
          <option>IGO SAMUEL LIRA DOS SANTOS OLIVEIRA</option>
          <option>MILTON ANTONIO DA MOTA COSTA</option>
          <option>WEVERTON GERALDO DOS SANTOS DUTRA</option>
        </select>
        <button class="btn-hist" onclick="setHistSupervisor()">Ver Histórico</button>
      </div>`;
    lista.innerHTML = '';
    counter.textContent = '';
    return;
  }

  identityBlock.innerHTML = `
    <div class="hist-identity">
      <div>
        <div class="hist-identity-label">Histórico de</div>
        <div class="hist-identity-name">${sup}</div>
      </div>
      <button class="hist-trocar" onclick="trocarSupervisor()">Trocar</button>
    </div>`;

  lista.innerHTML = '<div class="hist-loading">⏳ Carregando...</div>';
  counter.textContent = '';

  const { data, error } = await db
    .from('feedbacks')
    .select('*')
    .eq('supervisor', sup)
    .order('created_at', { ascending: false });

  if (error) {
    lista.innerHTML = '<div class="hist-empty"><span class="hist-empty-icon">⚠️</span>Erro ao carregar. Verifique sua conexão.</div>';
    return;
  }

  counter.textContent = `${data.length} feedback(s) registrado(s)`;

  if (data.length === 0) {
    lista.innerHTML = '<div class="hist-empty"><span class="hist-empty-icon">📋</span>Nenhum feedback registrado ainda.</div>';
    return;
  }

  lista.innerHTML = data.map((f, i) => renderCard(f, i)).join('');
}

function renderCard(f, i) {
  const data = f.data ? f.data.split('-').reverse().join('/') : '—';

  const natCls  = f.natureza === 'Positivo' ? 'hb-pos' : 'hb-neg';
  const gravCls = f.gravidade === 'Leve' ? 'hb-leve'
                : f.gravidade === 'Média' ? 'hb-media'
                : f.gravidade === 'Grave' ? 'hb-grave' : '';
  const acaoCls = f.acao_requerida === 'Nenhuma' ? 'hb-nenhuma' : 'hb-acao';

  const gravBadge = (f.gravidade && f.gravidade !== 'N/A')
    ? `<span class="hbadge ${gravCls}">${f.gravidade}</span>` : '';

  const descBlock = f.descricao ? `
    <div>
      <div class="hist-desc collapsed" id="hdesc-${i}">${f.descricao}</div>
      <span class="hist-desc-toggle" id="htoggle-${i}" onclick="toggleDescricao(${i})">Ver mais</span>
    </div>` : '';

  const sigBlock = f.Assinatura
    ? `<div>
        <div style="font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">Assinatura</div>
        <img src="${f.Assinatura}" style="max-height:48px;border-radius:4px;background:rgba(255,255,255,.85);padding:2px 6px">
      </div>` : '';

  return `
    <div class="hist-card">
      <div class="hist-card-header">
        <div class="hist-card-tecnico">${f.tecnico}</div>
        <div class="hist-card-data">${data}</div>
      </div>
      <div class="hist-badges">
        <span class="hbadge hb-tipo">${f.tipo}</span>
        <span class="hbadge ${natCls}">${f.natureza}</span>
        ${gravBadge}
        <span class="hbadge ${acaoCls}">${f.acao_requerida}</span>
      </div>
      ${descBlock}
      ${sigBlock}
    </div>`;
}

function toggleDescricao(i) {
  const el     = document.getElementById(`hdesc-${i}`);
  const toggle = document.getElementById(`htoggle-${i}`);
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    toggle.textContent = 'Ver menos';
  } else {
    el.classList.add('collapsed');
    toggle.textContent = 'Ver mais';
  }
}

function setHistSupervisor() {
  const val = document.getElementById('hist-sup-select').value;
  if (!val) return;
  localStorage.setItem('fb_supervisor', val);
  loadHistorico();
}

function trocarSupervisor() {
  localStorage.removeItem('fb_supervisor');
  loadHistorico();
}

/* ========== NÃO CONFORMIDADES ========== */

let _ncData = [];

async function loadNaoConformidades() {
  const sup = localStorage.getItem('fb_supervisor');
  const identityBlock = document.getElementById('nc-identity-block');
  const toolbar = document.getElementById('nc-toolbar');
  const lista   = document.getElementById('nc-lista');
  const counter = document.getElementById('nc-counter');

  if (!sup) {
    identityBlock.innerHTML = `
      <div class="hist-selector">
        <p class="hist-selector-label">Selecione sua equipe para ver as não conformidades:</p>
        <select id="nc-sup-select">
          <option value="">Selecione...</option>
          <option>ARTHUR GOMES CRUZ</option>
          <option>IGO SAMUEL LIRA DOS SANTOS OLIVEIRA</option>
          <option>MILTON ANTONIO DA MOTA COSTA</option>
          <option>WEVERTON GERALDO DOS SANTOS DUTRA</option>
        </select>
        <button class="btn-hist" onclick="setNcSupervisor()">Ver Não Conformidades</button>
      </div>`;
    toolbar.style.display = 'none';
    lista.innerHTML = '';
    counter.textContent = '';
    return;
  }

  identityBlock.innerHTML = `
    <div class="hist-identity">
      <div>
        <div class="hist-identity-label">Não conformidades de</div>
        <div class="hist-identity-name">${sup}</div>
      </div>
      <button class="hist-trocar" onclick="trocarSupervisorNc()">Trocar</button>
    </div>`;

  toolbar.style.display = 'none';
  lista.innerHTML = '<div class="hist-loading">⏳ Carregando...</div>';
  counter.textContent = '';

  const equipe = EQUIPES[sup] || [];

  const { data, error } = await db
    .from('nao_conformidades')
    .select('*')
    .in('tecnico_nome', equipe)
    .order('created_at', { ascending: false });

  if (error) {
    lista.innerHTML = '<div class="hist-empty"><span class="hist-empty-icon">⚠️</span>Erro ao carregar. Verifique sua conexão.</div>';
    return;
  }

  _ncData = data;

  const tecSelect = document.getElementById('nc-filter-tec');
  const tecAnterior = tecSelect.value;
  tecSelect.innerHTML = '<option value="">Todos os técnicos</option>';
  const tecnicos = [...new Set(data.map(f => f.tecnico_nome))].sort();
  tecnicos.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    tecSelect.appendChild(opt);
  });
  tecSelect.value = tecnicos.includes(tecAnterior) ? tecAnterior : '';

  toolbar.style.display = data.length ? '' : 'none';
  renderNcCards(tecSelect.value ? data.filter(f => f.tecnico_nome === tecSelect.value) : data);
}

function renderNcCards(data) {
  const lista   = document.getElementById('nc-lista');
  const counter = document.getElementById('nc-counter');

  counter.textContent = `${data.length} não conformidade(s)`;

  if (data.length === 0) {
    lista.innerHTML = '<div class="hist-empty"><span class="hist-empty-icon">✅</span>Nenhuma não conformidade encontrada.</div>';
    return;
  }

  lista.innerHTML = data.map((nc, i) => {
    const gravCls = nc.nc_gravidade === 'LEVE' || nc.nc_gravidade === 'Leve' ? 'hb-leve'
                  : nc.nc_gravidade === 'MÉDIA' || nc.nc_gravidade === 'Média' ? 'hb-media'
                  : nc.nc_gravidade === 'GRAVE' || nc.nc_gravidade === 'Grave' ? 'hb-grave' : '';
    const gravBadge = nc.nc_gravidade
      ? `<span class="hbadge ${gravCls}">${nc.nc_gravidade}</span>` : '';

    return `
    <div class="hist-card clickable" onclick="_ncOpenIdx(${i})">
      <div class="hist-card-header">
        <div class="hist-card-tecnico">${nc.tecnico_nome || '—'}</div>
        <div class="hist-card-data">${nc.dt_os_execucao || '—'}</div>
      </div>
      <div class="hist-badges">
        ${gravBadge}
        ${nc.os_id ? `<span class="hbadge" style="background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.3)">OS ${nc.os_id}</span>` : ''}
      </div>
      ${nc.cliente_nome ? `<div class="hist-desc" style="margin-top:2px">👤 ${nc.cliente_nome}</div>` : ''}
      ${nc.nc_tipo ? `<div class="hist-desc" style="color:var(--gold-light);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px">${nc.nc_tipo}</div>` : ''}
      <div class="hist-desc" style="color:var(--green-mid);font-size:.7rem;margin-top:2px">Toque para ver detalhes →</div>
    </div>`;
  }).join('');

  window._ncCurrentData = data;
}

function _ncOpenIdx(i) { openNcSheet(window._ncCurrentData[i]); }

function filterNaoConformidades() {
  const tec = document.getElementById('nc-filter-tec').value;
  const filtered = tec ? _ncData.filter(f => f.tecnico_nome === tec) : _ncData;
  renderNcCards(filtered);
}

function setNcSupervisor() {
  const val = document.getElementById('nc-sup-select').value;
  if (!val) return;
  localStorage.setItem('fb_supervisor', val);
  loadNaoConformidades();
}

function trocarSupervisorNc() {
  localStorage.removeItem('fb_supervisor');
  loadNaoConformidades();
}

/* === Detalhe NC === */
function openNcSheet(nc) {
  const gravCls = nc.nc_gravidade === 'LEVE' || nc.nc_gravidade === 'Leve' ? 'hb-leve'
                : nc.nc_gravidade === 'MÉDIA' || nc.nc_gravidade === 'Média' ? 'hb-media'
                : nc.nc_gravidade === 'GRAVE' || nc.nc_gravidade === 'Grave' ? 'hb-grave' : '';

  document.getElementById('nc-sheet-title').textContent = nc.tecnico_nome || 'Não Conformidade';
  document.getElementById('nc-sheet-body').innerHTML = `
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Técnico</span>
      <span class="nc-detail-val">${nc.tecnico_nome || '—'}</span>
    </div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Data OS</span>
      <span class="nc-detail-val">${nc.dt_os_execucao || '—'}</span>
    </div>
    <div class="nc-detail-divider"></div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Gravidade</span>
      <span class="nc-detail-val"><span class="hbadge ${gravCls}">${nc.nc_gravidade || '—'}</span></span>
    </div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">OS ID</span>
      <span class="nc-detail-val muted">${nc.os_id || '—'}</span>
    </div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Cliente</span>
      <span class="nc-detail-val">${nc.cliente_nome || '—'}</span>
    </div>
    <div class="nc-detail-divider"></div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Tipo</span>
      <span class="nc-detail-val">${nc.nc_tipo || '—'}</span>
    </div>
    ${nc.nc_fato ? `
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Fato Concreto</span>
      <span class="nc-detail-val muted">${nc.nc_fato}</span>
    </div>` : ''}
  `;
  document.getElementById('nc-overlay').classList.add('open');
  document.getElementById('nc-sheet').classList.add('open');
}

function closeNcSheet() {
  document.getElementById('nc-overlay').classList.remove('open');
  document.getElementById('nc-sheet').classList.remove('open');
}
