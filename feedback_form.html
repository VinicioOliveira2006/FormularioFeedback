<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Registro de Feedback · Maxx Net</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#090c15">
<link rel="apple-touch-icon" href="logonew.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.1/dist/umd/supabase.min.js" integrity="sha384-fx4y4cDx8NYfissnVzdGJY3yVXWY3rn5ab5HTUjpvgT35oDiyAbjjqnLhnRmESNE" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
:root{
  /* Base – dark SaaS */
  --bg:#090c15;
  --surf:#141926;
  --surf2:#1d2333;
  --bdr:#2a3242;
  --txt:#eaf0f9;
  --muted:#8590a5;

  /* Paleta de marca */
  --green:#41BB91;
  --green-mid:#33A87E;
  --green-light:#4ecfa0;
  --green-bright:#63d6ab;
  --gold:#FFCC04;
  --gold-light:#FFCC04;
  --gold-bright:#ffd94d;
  --purple:#9b7bc9;
  --pink:#d94fb0;
  --oliva:#CCCB31;

  /* Funcionais (dentro da paleta) */
  --neg:#d94fb0;
  --warn:#CCCB31;

  /* Gradientes de assinatura */
  --grad:linear-gradient(135deg,#41BB91 0%,#5a8fb0 48%,#82689D 100%);
  --grad-mag:linear-gradient(135deg,#B73895 0%,#82689D 100%);
  --sh:0 8px 28px rgba(0,0,0,.4);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background-color:var(--bg);
  background-image:
    radial-gradient(900px 420px at 12% -8%, rgba(65,187,145,.10), transparent 60%),
    radial-gradient(760px 380px at 92% -4%, rgba(130,104,157,.12), transparent 60%);
  background-attachment:fixed;
  color:var(--txt);
  min-height:100vh;
}

/* Faixa de identidade – gradiente da marca */
body::before{
  content:'';display:block;height:4px;
  background:linear-gradient(90deg,#41BB91 0%,#82689D 42%,#B73895 72%,#FFCC04 100%);
}

/* Header */
header{
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(29,35,51,.55),rgba(20,25,38,.55));
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
  position:relative;overflow:hidden;
}
header h1{
  font-size:1.1rem;font-weight:700;letter-spacing:-.3px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:var(--green);
}
header p{color:var(--muted);font-size:.78rem;margin-top:3px}

/* === Tab Bar === */
.tab-bar{
  display:flex;
  background:rgba(20,25,38,.7);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:50;
}
.tab{
  flex:1;padding:13px 8px;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);font-family:inherit;
  font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.tab.active{
  color:var(--green-bright);
  border-bottom-color:var(--green);
  background:rgba(65,187,145,.08);
}
.tab:hover:not(.active){color:var(--txt);background:rgba(255,255,255,.04)}

/* Contêiner do formulário */
.wrap{
  padding:20px;max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;gap:16px;
}

.fg{display:flex;flex-direction:column;gap:6px}

/* Labels */
label.lbl{
  font-size:.68rem;font-weight:700;
  color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px;
}

/* Inputs */
select,textarea,input[type=date],input[type=text]{
  background:var(--surf2);color:var(--txt);
  border:1px solid var(--bdr);
  border-radius:10px;padding:12px;
  font-size:.9rem;font-family:inherit;width:100%;
  -webkit-appearance:none;appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
select:focus,textarea:focus,input:focus{
  outline:none;
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(65,187,145,.20);
}
select:disabled{opacity:.4;cursor:not-allowed}
textarea{resize:vertical;min-height:100px}

/* Divisor */
.divider{
  height:1px;margin:6px 0;
  background:linear-gradient(90deg,transparent,var(--bdr) 20%,var(--bdr) 80%,transparent);
}

/* Grades de opções */
.rg{display:grid;gap:8px}
.rg2{grid-template-columns:1fr 1fr}
.rg3{grid-template-columns:1fr 1fr 1fr}

.ropt{
  display:flex;align-items:center;justify-content:center;
  padding:11px 8px;border-radius:10px;
  border:1.5px solid var(--bdr);
  background:var(--surf);
  cursor:pointer;font-size:.83rem;font-weight:500;
  transition:all .15s;text-align:center;user-select:none;
  color:var(--muted);
}
.ropt:hover{
  border-color:var(--green);
  background:var(--surf2);
  color:var(--txt);
}

/* Estados selecionados – mapa semântico da paleta */
.sel-pos    {border-color:var(--green);background:rgba(65,187,145,.14);color:var(--green-bright)}
.sel-neg    {border-color:var(--pink);background:rgba(217,79,176,.14);color:var(--pink)}
.sel-tipo   {border-color:var(--purple);background:rgba(155,123,201,.16);color:var(--purple)}
.sel-leve   {border-color:var(--green);background:rgba(65,187,145,.14);color:var(--green-bright)}
.sel-media  {border-color:var(--oliva);background:rgba(204,203,49,.14);color:var(--oliva)}
.sel-grave  {border-color:var(--pink);background:rgba(217,79,176,.14);color:var(--pink)}
.sel-acao   {border-color:var(--purple);background:rgba(155,123,201,.16);color:var(--purple)}
.sel-nenhuma{border-color:var(--bdr);background:var(--surf2);color:var(--muted)}

/* Botão – gradiente da marca */
.btn{
  background:var(--grad);
  color:#fff;border:none;border-radius:12px;
  padding:14px;font-size:1rem;font-weight:700;
  cursor:pointer;width:100%;
  transition:all .2s;margin-top:4px;
  letter-spacing:.2px;
  box-shadow:0 8px 24px rgba(65,187,145,.28);
}
.btn:hover{
  filter:brightness(1.06);
  box-shadow:0 10px 30px rgba(130,104,157,.42);
  transform:translateY(-1px);
}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:10px;
  font-size:.88rem;font-weight:600;
  box-shadow:0 4px 20px #0008;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;
}
.toast.show{opacity:1}
.toast.ok {background:var(--green-mid);color:#fff}
.toast.err{background:#B73895;color:#fff}

/* === Histórico === */
.hist-identity{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:10px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.hist-identity-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.hist-identity-name{font-size:.84rem;font-weight:600;color:var(--txt);line-height:1.3}
.hist-trocar{
  background:none;border:1px solid var(--bdr);border-radius:6px;
  padding:6px 12px;font-size:.72rem;color:var(--muted);
  cursor:pointer;font-family:inherit;font-weight:600;
  transition:all .15s;white-space:nowrap;
}
.hist-trocar:hover{border-color:var(--green);color:var(--green-bright)}

.hist-selector{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:10px;padding:16px;
  display:flex;flex-direction:column;gap:12px;
}
.hist-selector-label{font-size:.75rem;color:var(--muted)}
.btn-hist{
  background:var(--grad);
  color:#fff;border:none;border-radius:10px;
  padding:11px;font-size:.88rem;font-weight:700;
  cursor:pointer;font-family:inherit;
  transition:filter .2s;
}
.btn-hist:hover{filter:brightness(1.08)}

.hist-counter{
  font-size:.73rem;color:var(--muted);text-align:right;padding:0 2px;
}

.hist-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:14px;
  display:flex;flex-direction:column;gap:10px;
}
.hist-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hist-card-tecnico{font-size:.88rem;font-weight:600;color:var(--txt)}
.hist-card-data{font-size:.73rem;color:var(--muted);white-space:nowrap;padding-top:2px}

.hist-badges{display:flex;flex-wrap:wrap;gap:6px}
.hbadge{
  display:inline-block;padding:3px 9px;border-radius:20px;
  font-size:.67rem;font-weight:700;letter-spacing:.3px;
}
.hb-tipo   {background:rgba(155,123,201,.15);color:#b79ae0;border:1px solid rgba(155,123,201,.32)}
.hb-pos    {background:rgba(65,187,145,.14);color:var(--green-bright);border:1px solid rgba(65,187,145,.32)}
.hb-neg    {background:rgba(217,79,176,.14);color:#e878c4;border:1px solid rgba(217,79,176,.32)}
.hb-leve   {background:rgba(65,187,145,.14);color:var(--green-bright);border:1px solid rgba(65,187,145,.32)}
.hb-media  {background:rgba(204,203,49,.14);color:var(--oliva);border:1px solid rgba(204,203,49,.32)}
.hb-grave  {background:rgba(217,79,176,.14);color:#e878c4;border:1px solid rgba(217,79,176,.32)}
.hb-acao   {background:rgba(155,123,201,.15);color:#b79ae0;border:1px solid rgba(155,123,201,.32)}
.hb-nenhuma{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--bdr)}

.hist-desc{font-size:.8rem;color:var(--muted);line-height:1.55}
.hist-desc.collapsed{
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hist-desc-toggle{
  font-size:.7rem;color:var(--green-mid);cursor:pointer;
  display:inline-block;margin-top:4px;
}
.hist-desc-toggle:hover{color:var(--green-bright)}

.hist-empty{
  text-align:center;padding:40px 20px;
  color:var(--muted);font-size:.85rem;line-height:1.6;
}
.hist-empty-icon{font-size:2rem;display:block;margin-bottom:10px}

.hist-loading{
  text-align:center;padding:40px 20px;
  color:var(--muted);font-size:.85rem;
}

/* Assinatura */
.sig-wrap{
  border:1.5px dashed var(--bdr);border-radius:10px;
  overflow:hidden;background:#f5f7fb;
  touch-action:none;position:relative;cursor:crosshair;
  user-select:none;-webkit-user-select:none;
}
.sig-wrap canvas{display:block;width:100%}
.sig-ph{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;pointer-events:none;
  color:#8a93a3;font-size:.78rem;text-align:center;
}
.sig-actions{display:flex;justify-content:flex-end;margin-top:6px}
.sig-clear{
  background:none;border:1px solid var(--bdr);border-radius:6px;
  padding:5px 12px;font-size:.72rem;color:var(--muted);
  cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;
}
.sig-clear:hover{border-color:var(--neg);color:var(--neg)}

/* === Modal NC detalhe === */
.nc-overlay{
  position:fixed;inset:0;background:rgba(9,12,21,.6);backdrop-filter:blur(4px);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.nc-overlay.open{opacity:1;pointer-events:all}
.nc-sheet{
  position:fixed;left:0;right:0;bottom:0;
  background:var(--surf2);border-radius:16px 16px 0 0;
  border-top:1px solid var(--bdr);
  z-index:201;max-height:80vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.nc-sheet.open{transform:translateY(0)}
.nc-sheet-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--bdr);margin:10px auto 0;flex-shrink:0;
}
.nc-sheet-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;flex-shrink:0;
  border-bottom:1px solid var(--bdr);
}
.nc-sheet-header h3{font-size:.9rem;font-weight:700;color:var(--txt)}
.nc-sheet-close{
  background:none;border:none;color:var(--muted);
  font-size:1.5rem;cursor:pointer;line-height:1;padding:4px;
}
.nc-sheet-body{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.nc-detail-row{display:flex;flex-direction:column;gap:3px}
.nc-detail-lbl{font-size:.63rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.nc-detail-val{font-size:.85rem;color:var(--txt);line-height:1.5}
.nc-detail-val.muted{color:var(--muted)}
.nc-detail-divider{height:1px;background:var(--bdr)}
.hist-card.clickable{cursor:pointer;transition:border-color .15s}
.hist-card.clickable:hover{border-color:rgba(65,187,145,.4);box-shadow:0 6px 18px rgba(0,0,0,.3)}
.hist-card.clickable:active{border-color:var(--green)}

/* === Não Conformidades === */
.nc-toolbar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.nc-toolbar-filters{display:flex;gap:8px;flex-wrap:wrap;flex:1;justify-content:flex-end}
.nc-toolbar select{
  flex:1 1 130px;min-width:120px;font-size:.78rem;padding:6px 10px;
}

/* Selo realizada */
.hb-realizada{background:rgba(65,187,145,.16);color:var(--green-bright);border:1px solid rgba(65,187,145,.4)}

/* Ação: marcar feedback realizado */
.btn-nc-done{
  width:100%;background:var(--grad);color:#fff;border:none;border-radius:12px;
  padding:13px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;
  box-shadow:0 8px 24px rgba(65,187,145,.28);transition:filter .2s;
}
.btn-nc-done:hover{filter:brightness(1.06)}
.nc-realizada-box{
  background:rgba(65,187,145,.1);border:1px solid rgba(65,187,145,.35);
  border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px;
}
.nc-realizada-box .rz-title{color:var(--green-bright);font-weight:700;font-size:.9rem}
.nc-realizada-box .rz-meta{color:var(--muted);font-size:.78rem}
.btn-nc-undo{
  align-self:flex-start;margin-top:4px;background:none;border:1px solid var(--bdr);
  color:var(--muted);border-radius:8px;padding:6px 14px;font-size:.75rem;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.btn-nc-undo:hover{border-color:var(--neg);color:var(--neg)}
</style>
</head>
<body>
<header>
  <div>
    <h1>Registro de Feedback</h1>
    <p>Maxx Conectado · Supervisão de Campo</p>
  </div>
</header>

<div class="tab-bar">
  <button class="tab active" id="tab-form" onclick="showTab('form')">📋 Novo Feedback</button>
  <button class="tab" id="tab-historico" onclick="showTab('historico')">🕐 Meu Histórico</button>
  <button class="tab" id="tab-naoconf" onclick="showTab('naoconf')">⚠️ Não Conformidades</button>
</div>

<div class="wrap" id="section-form">

  <div class="fg">
    <label class="lbl">Equipe Técnica</label>
    <select id="supervisor">
      <option value="">Selecione...</option>
      <option>ARTHUR GOMES CRUZ</option>
      <option>IGO SAMUEL LIRA DOS SANTOS OLIVEIRA</option>
      <option>MILTON ANTONIO DA MOTA COSTA</option>
      <option>WEVERTON GERALDO DOS SANTOS DUTRA</option>
      <option>OUTRA EQUIPE</option>
    </select>
  </div>

  <div class="fg" id="nome-sup-wrap" style="display:none">
    <label class="lbl">Seu Nome</label>
    <select id="nome-supervisor">
      <option value="">Selecione...</option>
      <option>ARTHUR GOMES CRUZ</option>
      <option>IGO SAMUEL LIRA DOS SANTOS OLIVEIRA</option>
      <option>MILTON ANTONIO DA MOTA COSTA</option>
      <option>WEVERTON GERALDO DOS SANTOS DUTRA</option>
    </select>
  </div>

  <div class="fg">
    <label class="lbl">Técnico Avaliado</label>
    <select id="tecnico" disabled>
      <option value="">Selecione o supervisor primeiro...</option>
    </select>
  </div>

  <div class="fg">
    <label class="lbl">Data</label>
    <input type="date" id="data">
  </div>

  <div class="divider"></div>

  <div class="fg">
    <label class="lbl">Tipo de Feedback</label>
    <div class="rg rg2">
      <div class="ropt" data-g="tipo" data-v="Técnico">Técnico</div>
      <div class="ropt" data-g="tipo" data-v="Comportamental">Comportamental</div>
      <div class="ropt" data-g="tipo" data-v="Segurança">Segurança</div>
      <div class="ropt" data-g="tipo" data-v="Procedimento">Procedimento</div>
    </div>
  </div>

  <div class="fg">
    <label class="lbl">Natureza</label>
    <div class="rg rg2">
      <div class="ropt" data-g="natureza" data-v="Positivo">✅ Positivo</div>
      <div class="ropt" data-g="natureza" data-v="Negativo">⚠️ Negativo</div>
    </div>
  </div>

  <div class="fg" id="grav-wrap">
    <label class="lbl">Gravidade</label>
    <div class="rg rg3">
      <div class="ropt" data-g="gravidade" data-v="Leve">Leve</div>
      <div class="ropt" data-g="gravidade" data-v="Média">Média</div>
      <div class="ropt" data-g="gravidade" data-v="Grave">Grave</div>
    </div>
  </div>

  <div class="fg">
    <label class="lbl">Ação Requerida</label>
    <div class="rg rg2">
      <div class="ropt" data-g="acao" data-v="Advertência">Advertência</div>
      <div class="ropt" data-g="acao" data-v="Treinamento">Treinamento</div>
      <div class="ropt" data-g="acao" data-v="Reconhecimento">Reconhecimento</div>
      <div class="ropt" data-g="acao" data-v="Nenhuma">Nenhuma</div>
    </div>
  </div>

  <div class="fg">
    <label class="lbl">Descrição</label>
    <textarea id="descricao" maxlength="2000" placeholder="Descreva o ocorrido..."></textarea>
  </div>

  <div class="fg">
    <label class="lbl">Assinatura do Técnico</label>
    <div class="sig-wrap">
      <canvas id="sig-canvas" height="150"></canvas>
      <div class="sig-ph" id="sig-ph">
        <span style="font-size:1.4rem">✍️</span>
        <span>Assine com o dedo aqui</span>
      </div>
    </div>
    <div class="sig-actions">
      <button type="button" class="sig-clear" onclick="clearSig()">Limpar assinatura</button>
    </div>
  </div>

  <button class="btn" id="btn-enviar">Registrar Feedback</button>
</div>

<!-- Seção Histórico -->
<div class="wrap" id="section-historico" style="display:none">
  <div id="hist-identity-block"></div>
  <div id="hist-counter" class="hist-counter"></div>
  <div id="hist-lista"></div>
</div>

<!-- Seção Não Conformidades -->
<div class="wrap" id="section-naoconf" style="display:none">
  <div id="nc-identity-block"></div>
  <div class="nc-toolbar" id="nc-toolbar" style="display:none">
    <span class="hist-counter" id="nc-counter"></span>
    <div class="nc-toolbar-filters">
      <select id="nc-filter-status" onchange="filterNaoConformidades()">
        <option value="pendentes">Pendentes</option>
        <option value="realizadas">Realizadas</option>
        <option value="todas">Todas</option>
      </select>
      <select id="nc-filter-tec" onchange="filterNaoConformidades()">
        <option value="">Todos os técnicos</option>
      </select>
    </div>
  </div>
  <div id="nc-lista"></div>
</div>

<!-- Modal detalhe NC -->
<div class="nc-overlay" id="nc-overlay" onclick="closeNcSheet()"></div>
<div class="nc-sheet" id="nc-sheet">
  <div class="nc-sheet-handle"></div>
  <div class="nc-sheet-header">
    <h3 id="nc-sheet-title">Não Conformidade</h3>
    <button class="nc-sheet-close" onclick="closeNcSheet()">×</button>
  </div>
  <div class="nc-sheet-body" id="nc-sheet-body"></div>
</div>

<div class="toast" id="toast"></div>

function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));
}
/* Só aceita data URI de imagem como src de assinatura */
function safeSig(s){
  s = String(s || '');
  return /^data:image\/(png|jpeg|jpg|webp|gif);base64,[A-Za-z0-9+/=\s]+$/.test(s) ? s : '';
}

  tipo: () => 'sel-tipo',

  gravidade: v => v === 'Leve' ? 'sel-leve' : v === 'Média' ? 'sel-media' : 'sel-grave',

};

      r.className = 'ropt';
    });

  });
});

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', type === 'err' ? 7000 : 3000);
}

document.getElementById('btn-enviar').addEventListener('click', async () => {
  const supSel    = document.getElementById('supervisor').value;
  const nomeDigitado = document.getElementById('nome-supervisor').value;
  const supervisor = supSel === 'OUTRA EQUIPE' ? (nomeDigitado || 'OUTRA EQUIPE') : supSel;
  const tecnico   = document.getElementById('tecnico').value;
  const data      = document.getElementById('data').value;
  const descricao = document.getElementById('descricao').value.trim();

  if (!supSel || !tecnico || !data || !SEL.tipo || !SEL.natureza || !SEL.acao) {
    toast('Preencha todos os campos obrigatórios.', 'err'); return;
  }
  if (supSel === 'OUTRA EQUIPE' && !nomeDigitado) {
    toast('Digite seu nome.', 'err'); return;
  }
  if (SEL.natureza === 'Negativo' && !SEL.gravidade) {
    toast('Selecione a gravidade.', 'err'); return;
  }
  if (sigEmpty) {
    toast('Registre a assinatura do técnico.', 'err'); return;
  }

  /* Validação de valores permitidos (rejeita valor adulterado) + tamanho */
  const OK_TIPO = ['Técnico','Comportamental','Segurança','Procedimento'];
  const OK_NAT  = ['Positivo','Negativo'];
  const OK_GRAV = ['Leve','Média','Grave','N/A'];
  const OK_ACAO = ['Advertência','Treinamento','Reconhecimento','Nenhuma'];
  const gravFinal = SEL.natureza === 'Positivo' ? 'N/A' : SEL.gravidade;
  if (!OK_TIPO.includes(SEL.tipo) || !OK_NAT.includes(SEL.natureza) ||
      !OK_ACAO.includes(SEL.acao) || !OK_GRAV.includes(gravFinal)) {
    toast('Valores inválidos no formulário. Recarregue a página.', 'err'); return;
  }
  if (descricao.length > 2000) {
    toast('Descrição muito longa (máx. 2000 caracteres).', 'err'); return;
  }

  const btn = document.getElementById('btn-enviar');
  btn.disabled = true; btn.textContent = 'Enviando...';

  const { error } = await db.from('feedbacks').insert({
    supervisor, tecnico, data,
    tipo: SEL.tipo,
    natureza: SEL.natureza,
    gravidade: SEL.natureza === 'Positivo' ? 'N/A' : SEL.gravidade,
    acao_requerida: SEL.acao,
    descricao,
    Assinatura: sigCanvas.toDataURL('image/png')
  });

  if (error) {
    console.error('Supabase insert error:', JSON.stringify(error));
    const msg = error.message || error.details || JSON.stringify(error);
    toast('Erro: ' + msg, 'err');
    btn.disabled = false; btn.textContent = 'Registrar Feedback';
  } else {
    toast('Feedback registrado com sucesso!', 'ok');
    setTimeout(() => location.reload(), 1500);
  }
});

/* ===== ASSINATURA ===== */
const sigCanvas = document.getElementById('sig-canvas');
const sigCtx = sigCanvas.getContext('2d');
let sigDrawing = false;
let sigEmpty = true;

function initSig() {
  const w = sigCanvas.parentElement.clientWidth;
  if (w > 0) sigCanvas.width = w;
  sigCtx.strokeStyle = '#1C2230';
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
}

function getSigPos(e) {
  const r = sigCanvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - r.left) * (sigCanvas.width / r.width),
    y: (src.clientY - r.top) * (sigCanvas.height / r.height)
  };
}

sigCanvas.addEventListener('mousedown', e => {
  sigDrawing = true; sigCtx.beginPath();
  const p = getSigPos(e); sigCtx.moveTo(p.x, p.y);
});
sigCanvas.addEventListener('mousemove', e => {
  if (!sigDrawing) return;
  const p = getSigPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); hideSigPh();
});
sigCanvas.addEventListener('mouseup', () => sigDrawing = false);
sigCanvas.addEventListener('mouseleave', () => sigDrawing = false);
sigCanvas.addEventListener('touchstart', e => {
  e.preventDefault(); sigDrawing = true; sigCtx.beginPath();
  const p = getSigPos(e); sigCtx.moveTo(p.x, p.y);
}, { passive: false });
sigCanvas.addEventListener('touchmove', e => {
  e.preventDefault(); if (!sigDrawing) return;
  const p = getSigPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); hideSigPh();
}, { passive: false });
sigCanvas.addEventListener('touchend', () => sigDrawing = false);

function hideSigPh() {
  if (!sigEmpty) return;
  sigEmpty = false;
  document.getElementById('sig-ph').style.display = 'none';
}

function clearSig() {
  sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
  sigEmpty = true;
  document.getElementById('sig-ph').style.display = '';
}

function showTab(tab) {
  document.getElementById('section-form').style.display      = tab === 'form'      ? '' : 'none';
  document.getElementById('section-historico').style.display = tab === 'historico' ? '' : 'none';
  document.getElementById('section-naoconf').style.display   = tab === 'naoconf'   ? '' : 'none';
  document.getElementById('tab-form').classList.toggle('active',      tab === 'form');
  document.getElementById('tab-historico').classList.toggle('active', tab === 'historico');
  document.getElementById('tab-naoconf').classList.toggle('active',   tab === 'naoconf');
  if (tab === 'historico') loadHistorico();
  if (tab === 'naoconf')   loadNaoConformidades();
}

async function loadHistorico() {
  const sup = localStorage.getItem('fb_supervisor');
  const identityBlock = document.getElementById('hist-identity-block');
  const lista  = document.getElementById('hist-lista');
  const counter = document.getElementById('hist-counter');

  if (!sup) {
    identityBlock.innerHTML = `
      <div class="hist-selector">
        <p class="hist-selector-label">Selecione sua equipe para ver seu histórico:</p>
        <select id="hist-sup-select">
          <option value="">Selecione...</option>
          <option>ARTHUR GOMES CRUZ</option>
          <option>IGO SAMUEL LIRA DOS SANTOS OLIVEIRA</option>
          <option>MILTON ANTONIO DA MOTA COSTA</option>
          <option>WEVERTON GERALDO DOS SANTOS DUTRA</option>
        </select>
        <button class="btn-hist" onclick="setHistSupervisor()">Ver Histórico</button>
      </div>`;
    lista.innerHTML = '';
    counter.textContent = '';
    return;
  }

  identityBlock.innerHTML = `
    <div class="hist-identity">
      <div>
        <div class="hist-identity-label">Histórico de</div>
        <div class="hist-identity-name">${sup}</div>
      </div>
      <button class="hist-trocar" onclick="trocarSupervisor()">Trocar</button>
    </div>`;

  lista.innerHTML = '<div class="hist-loading">⏳ Carregando...</div>';
  counter.textContent = '';

  const { data, error } = await db
    .from('feedbacks')
    .select('*')
    .eq('supervisor', sup)
    .order('created_at', { ascending: false });

  if (error) {
    lista.innerHTML = '<div class="hist-empty"><span class="hist-empty-icon">⚠️</span>Erro ao carregar. Verifique sua conexão.</div>';
    return;
  }

  counter.textContent = `${data.length} feedback(s) registrado(s)`;

  if (data.length === 0) {
    lista.innerHTML = '<div class="hist-empty"><span class="hist-empty-icon">📋</span>Nenhum feedback registrado ainda.</div>';
    return;
  }

  lista.innerHTML = data.map((f, i) => renderCard(f, i)).join('');
}

function renderCard(f, i) {
  const data = f.data ? f.data.split('-').reverse().join('/') : '—';

  const natCls  = f.natureza === 'Positivo' ? 'hb-pos' : 'hb-neg';
  const gravCls = f.gravidade === 'Leve' ? 'hb-leve'
                : f.gravidade === 'Média' ? 'hb-media'
                : f.gravidade === 'Grave' ? 'hb-grave' : '';
  const acaoCls = f.acao_requerida === 'Nenhuma' ? 'hb-nenhuma' : 'hb-acao';

  const gravBadge = (f.gravidade && f.gravidade !== 'N/A')
    ? `<span class="hbadge ${gravCls}">${esc(f.gravidade)}</span>` : '';

  const descBlock = f.descricao ? `
    <div>
      <div class="hist-desc collapsed" id="hdesc-${i}">${esc(f.descricao)}</div>
      <span class="hist-desc-toggle" id="htoggle-${i}" onclick="toggleDescricao(${i})">Ver mais</span>
    </div>` : '';

  const sig = safeSig(f.Assinatura);
  const sigBlock = sig
    ? `<div>
        <div style="font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">Assinatura</div>
        <img src="${sig}" style="max-height:48px;border-radius:4px;background:rgba(255,255,255,.85);padding:2px 6px">
      </div>` : '';

  return `
    <div class="hist-card">
      <div class="hist-card-header">
        <div class="hist-card-tecnico">${esc(f.tecnico)}</div>
        <div class="hist-card-data">${esc(data)}</div>
      </div>
      <div class="hist-badges">
        <span class="hbadge hb-tipo">${esc(f.tipo)}</span>
        <span class="hbadge ${natCls}">${esc(f.natureza)}</span>
        ${gravBadge}
        <span class="hbadge ${acaoCls}">${esc(f.acao_requerida)}</span>
      </div>
      ${descBlock}
      ${sigBlock}
    </div>`;
}

function toggleDescricao(i) {
  const el     = document.getElementById(`hdesc-${i}`);
  const toggle = document.getElementById(`htoggle-${i}`);
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    toggle.textContent = 'Ver menos';
  } else {
    el.classList.add('collapsed');
    toggle.textContent = 'Ver mais';
  }
}

function setHistSupervisor() {
  const val = document.getElementById('hist-sup-select').value;
  if (!val) return;
  localStorage.setItem('fb_supervisor', val);
  loadHistorico();
}

function trocarSupervisor() {
  localStorage.removeItem('fb_supervisor');
  loadHistorico();
}

  lista.innerHTML = data.map((nc, i) => {
    const gravCls = nc.nc_gravidade === 'LEVE' || nc.nc_gravidade === 'Leve' ? 'hb-leve'
                  : nc.nc_gravidade === 'MÉDIA' || nc.nc_gravidade === 'Média' ? 'hb-media'
                  : nc.nc_gravidade === 'GRAVE' || nc.nc_gravidade === 'Grave' ? 'hb-grave' : '';
    const gravBadge = nc.nc_gravidade
      ? `<span class="hbadge ${gravCls}">${esc(nc.nc_gravidade)}</span>` : '';

    return `
    <div class="hist-card clickable" onclick="_ncOpenIdx(${i})">
      <div class="hist-card-header">
        <div class="hist-card-tecnico">${esc(nc.tecnico_nome || '—')}</div>
        <div class="hist-card-data">${esc(nc.dt_os_execucao || '—')}</div>
      </div>
      <div class="hist-badges">
        ${gravBadge}
        ${nc.os_id ? `<span class="hbadge" style="background:rgba(155,123,201,.14);color:#b79ae0;border:1px solid rgba(155,123,201,.32)">OS ${esc(nc.os_id)}</span>` : ''}
        ${nc.realizada_em ? `<span class="hbadge hb-realizada">✓ Realizada</span>` : ''}
      </div>
      ${nc.cliente_nome ? `<div class="hist-desc" style="margin-top:2px">👤 ${esc(nc.cliente_nome)}</div>` : ''}
      ${nc.nc_tipo ? `<div class="hist-desc" style="color:var(--gold-light);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px">${esc(nc.nc_tipo)}</div>` : ''}
      <div class="hist-desc" style="color:var(--green-mid);font-size:.7rem;margin-top:2px">Toque para ver detalhes →</div>
    </div>`;
  }).join('');

  window._ncCurrentData = data;
}

function _ncOpenIdx(i) { openNcSheet(window._ncCurrentData[i]); }

function applyNcFilters() {
  const tec = document.getElementById('nc-filter-tec').value;
  const statusEl = document.getElementById('nc-filter-status');
  const status = statusEl ? statusEl.value : 'pendentes';
  let d = _ncData || [];
  if (tec) d = d.filter(f => f.tecnico_nome === tec);
  if (status === 'pendentes')  d = d.filter(f => !f.realizada_em);
  else if (status === 'realizadas') d = d.filter(f => f.realizada_em);
  return d;
}

function filterNaoConformidades() {
  renderNcCards(applyNcFilters());
}

function fmtDia(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return isNaN(d) ? '—' : d.toLocaleDateString('pt-BR');
}

async function marcarRealizada(id) {
  const sup = localStorage.getItem('fb_supervisor');
  if (!sup) { toast('Selecione o supervisor primeiro.', 'err'); return; }
  if (!confirm('Confirmar que o feedback desta não conformidade foi aplicado ao técnico?')) return;

  const agora = new Date().toISOString();
  const { error } = await db
    .from('nao_conformidades')
    .update({ realizada_em: agora, realizada_por: sup })
    .eq('id', id);

  if (error) { toast('Erro ao salvar. Tente novamente.', 'err'); return; }

  const nc = (_ncData || []).find(f => f.id === id);
  if (nc) { nc.realizada_em = agora; nc.realizada_por = sup; }
  renderNcCards(applyNcFilters());
  if (nc) openNcSheet(nc);
  toast('Feedback marcado como realizado ✓', 'ok');
}

async function desfazerRealizada(id) {
  if (!confirm('Desfazer? A NC voltará a constar como pendente.')) return;

  const { error } = await db
    .from('nao_conformidades')
    .update({ realizada_em: null, realizada_por: null })
    .eq('id', id);

  if (error) { toast('Erro ao salvar. Tente novamente.', 'err'); return; }

  const nc = (_ncData || []).find(f => f.id === id);
  if (nc) { nc.realizada_em = null; nc.realizada_por = null; }
  renderNcCards(applyNcFilters());
  if (nc) openNcSheet(nc);
  toast('Marcação desfeita.', 'ok');
}

function setNcSupervisor() {
  const val = document.getElementById('nc-sup-select').value;
  if (!val) return;
  localStorage.setItem('fb_supervisor', val);
  loadNaoConformidades();
}

function trocarSupervisorNc() {
  localStorage.removeItem('fb_supervisor');
  loadNaoConformidades();
}

/* === Detalhe NC === */
function openNcSheet(nc) {
  const gravCls = nc.nc_gravidade === 'LEVE' || nc.nc_gravidade === 'Leve' ? 'hb-leve'
                : nc.nc_gravidade === 'MÉDIA' || nc.nc_gravidade === 'Média' ? 'hb-media'
                : nc.nc_gravidade === 'GRAVE' || nc.nc_gravidade === 'Grave' ? 'hb-grave' : '';

  document.getElementById('nc-sheet-title').textContent = nc.tecnico_nome || 'Não Conformidade';
  document.getElementById('nc-sheet-body').innerHTML = `
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Técnico</span>
      <span class="nc-detail-val">${esc(nc.tecnico_nome || '—')}</span>
    </div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Data OS</span>
      <span class="nc-detail-val">${esc(nc.dt_os_execucao || '—')}</span>
    </div>
    <div class="nc-detail-divider"></div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Gravidade</span>
      <span class="nc-detail-val"><span class="hbadge ${gravCls}">${esc(nc.nc_gravidade || '—')}</span></span>
    </div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">OS ID</span>
      <span class="nc-detail-val muted">${esc(nc.os_id || '—')}</span>
    </div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Cliente</span>
      <span class="nc-detail-val">${esc(nc.cliente_nome || '—')}</span>
    </div>
    <div class="nc-detail-divider"></div>
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Tipo</span>
      <span class="nc-detail-val">${esc(nc.nc_tipo || '—')}</span>
    </div>
    ${nc.nc_fato ? `
    <div class="nc-detail-row">
      <span class="nc-detail-lbl">Fato Concreto</span>
      <span class="nc-detail-val muted">${esc(nc.nc_fato)}</span>
    </div>` : ''}
    <div class="nc-detail-divider"></div>
    ${nc.realizada_em
      ? `<div class="nc-realizada-box">
           <span class="rz-title">✓ Feedback realizado</span>
           <span class="rz-meta">em ${esc(fmtDia(nc.realizada_em))}${nc.realizada_por ? ' · por ' + esc(nc.realizada_por) : ''}</span>
           <button class="btn-nc-undo" onclick="desfazerRealizada('${esc(nc.id)}')">Desfazer</button>
         </div>`
      : `<button class="btn-nc-done" onclick="marcarRealizada('${esc(nc.id)}')">✓ Marcar feedback como realizado</button>`}
  `;
  document.getElementById('nc-overlay').classList.add('open');
  document.getElementById('nc-sheet').classList.add('open');
}

function closeNcSheet() {
  document.getElementById('nc-overlay').classList.remove('open');
  document.getElementById('nc-sheet').classList.remove('open');
}
</script>
</body>
</html>
